<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Platform Buddy キャッシュ更新</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06090d;
      --panel: rgba(18, 22, 27, 0.94);
      --text: #f5f7fa;
      --muted: #aeb7c2;
      --accent: #e83b3b;
      --line: rgba(255, 255, 255, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(232, 59, 59, 0.18), transparent 34%),
        linear-gradient(145deg, #05070a, #10151b 55%, #05070a);
      color: var(--text);
    }
    main {
      width: min(430px, 100%);
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 22px 80px rgba(0, 0, 0, 0.45);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(232, 59, 59, 0.14);
      color: #ff8d8d;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.06em;
    }
    h1 {
      margin: 18px 0 10px;
      font-size: clamp(26px, 8vw, 34px);
      line-height: 1.16;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 15px;
    }
    .status {
      margin: 18px 0;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-weight: 700;
      line-height: 1.55;
    }
    a, button {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 15px 18px;
      font: inherit;
      font-weight: 900;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }
    a {
      display: block;
      margin-top: 12px;
      background: var(--accent);
      color: white;
    }
    button {
      margin-top: 10px;
      background: rgba(255, 255, 255, 0.09);
      color: var(--text);
      border: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <main>
    <span class="badge">CACHE RESET</span>
    <h1>Platform Buddyを最新版に更新します</h1>
    <p>大きなアイコンだけ表示されて止まる場合、古いPWAキャッシュが残っている可能性があります。</p>
    <p>下のボタンでキャッシュを解除してから、最新版のアプリを開いてください。</p>
    <div class="status" id="status">準備できています。</div>
    <button type="button" id="resetButton">キャッシュを解除する</button>
    <a href="./index.html?v=103" id="openApp">最新版を開く</a>
  </main>
  <script>
    const statusBox = document.getElementById("status");
    const resetButton = document.getElementById("resetButton");

    async function resetCaches() {
      statusBox.textContent = "古い保存ファイルを確認しています...";
      try {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
        statusBox.textContent = "解除できました。最新版を開いてください。";
      } catch (error) {
        statusBox.textContent = "自動解除に失敗しました。ブラウザのサイトデータ削除も試してください。";
      }
    }

    resetButton.addEventListener("click", resetCaches);
  </script>
</body>
</html>
